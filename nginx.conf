server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Storybook é um app estático: cai no index.html quando a rota não é um arquivo
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressivo nos assets com hash no nome
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|woff2?|ttf|ico|json)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
