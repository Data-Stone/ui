server {
    listen 80;
    server_name _;

    # Cookies de terceiros do .datastone.com.br (GA/Ads/FB/Gleap etc.) sao
    # reenviados a todos os subdominios e acumulam ate estourar o buffer default
    # do nginx (4 8k), gerando "400 Request Header Or Cookie Too Large" em
    # ui.datastone.com.br para usuarios com muitos cookies. Damos folga ate 32k.
    large_client_header_buffers 4 32k;
    client_header_buffer_size   16k;

    root /usr/share/nginx/html;
    index index.html;

    # Storybook é um app estático: cai no index.html quando a rota não é um arquivo
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressivo nos assets com hash no nome
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|woff2?|ttf|ico|json)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
